version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Lima
    open-pull-requests-limit: 5
    labels: [dependencies]
    ignore:
      - dependency-name: typescript
        versions: [">=7.0.0"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: America/Lima
    open-pull-requests-limit: 5
    labels: [dependencies]
